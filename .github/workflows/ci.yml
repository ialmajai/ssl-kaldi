name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # 3.8 is the repo floor: the GRID recipe's AV-HuBERT / fairseq
          # stack requires it, so CI validates against the same version.
          python-version: '3.8'
      - name: Install flake8
        run: pip install flake8
      - name: Syntax errors & undefined names
        # Only the real-bug subset; no style nitpicking. Vendored/upstream
        # trees and Kaldi symlinks are excluded.
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,*/kenlm/*,*/steps/*,*/utils/*,*/av_hubert/*,*/corpus/*,*/asr_swahili/*
