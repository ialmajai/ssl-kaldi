name: CI

on:
  push:
    branches: [ master ]
  pull_request:

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.10 is the general target for the audio recipes; 3.8 keeps the
        # GRID recipe's AV-HuBERT / fairseq code parseable on its required floor.
        python-version: ['3.8', '3.10']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install flake8
        run: pip install flake8
      - name: Syntax errors & undefined names
        # Only the real-bug subset — no style nitpicking. Vendored/upstream
        # trees and Kaldi symlinks are excluded.
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics \
            --exclude=.git,*/kenlm/*,*/steps/*,*/utils/*,*/av_hubert/*,*/corpus/*,*/asr_swahili/*
